<!-- Elaborar um programa que leia a duração de uma viagem em dias e horas. Calcule e informa a duração total da viagem em números e horas. -->

<script>
    const dias = Number(prompt("Nº de dias:"));
    const horas = Number(prompt("Nº de horas:"));
    const total = (dias * 24) + horas;
    alert(`Total de Horas: ${total}`);
</script>
